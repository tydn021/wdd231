    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Calistoga&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"

</head>

<body>
    <header>
        <div class="left">
        <img class="favicon" src="images/cottage.svg" alt="cottage">
        <h1 class="curlycue">Storybook Homes</h1>
        </div>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li class="current"><a href="index.html">Home</a></li>
                <li><a href="houses.html">Houses</a></li>
                <li><a href="architects.html">Architects</a></li>
            </ul>
        </nav>

        <span class="undercurly">૮︵⭒‿᧔☪︎᧓‿⋆︵౨</span>


        <div class="right">

            <img class="half-circle" src="images/circle-half.svg" alt="half circle">
            <button id="nav-button" class="hamburger" aria-label="navigation"></button>

        </div>
    </header>
     <div class="hero-image">
        <img src="images/hero-image.webp" alt="storybook-hero" loading="lazy">
    </div>
    <main class="index-main">
        <h2>Home</h2>
        <div>
        <section>
            <h3>History of Storybook Style!</h3>
            <P>Back in the early days of Hollywood, California, movie sets were a huge undertaking</P>
        </section>
        </div>

        <div class="join-form">
            <form method="GET" action="thankyou.html" class="carmel-form">
                <h3>Tour of Carmel by the Sea</h3>
                <label>First Name <input type="text" name="first" required autocomplete="given-name"
                        title="Your First Name"></label>
                <label>Last Name <input type="text" name="last" required autocomplete="family-name"
                        title="Your Last Name"></label>

                <label>Organization/Business Name <input type="text" name="org-name" autocomplete="organization"
                        title="What is the name of your business?" required></label>

                <label>Organizational Title <input type="text" name="org-title" autocomplete="organization-title"
                        title="What is your role?" pattern="[A-Za-z\s-]{7,}" required></label>

                <label>Cell Phone <input type="tel" name="phone" autocomplete="tel" title="A Phone Number with dashes"
                        placeholder="987-555-1234" required></label>
                <label>Email <input type="email" name="email" required placeholder="john89@gmail.com" title="Your Email"
                        autocomplete="email"></label>

                <input type="hidden" id="time" name="timestamp">


                <h3>Select Tour Day Length</h3>
                <fieldset>
                    <label class="level"><input type="radio" name="membership-level" value="1-day" checked> 1-Day Tour</label>
                    <label class="level"><input type="radio" name="membership-level" value="2-day"> 2-Day Tour</label>
                    <label class="level"><input type="radio" name="membership-level" value="3-day"> 3-Day Tour</label>
                </fieldset>

                <input class="join-button" type="submit" value="Join our Tour!">
            </form>
        </div>


    </main>
</body>
</html>
